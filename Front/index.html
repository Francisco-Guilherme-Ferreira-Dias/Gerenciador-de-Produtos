<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Produtos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
     <h1>Gerenciador de Produtos</h1>

    <form id="formProduto">

        <input
            type="hidden"
            id="idProduto"
        >

        <input
            type="text"
            id="nome"
            placeholder="Nome"
            required
        >

        <input
            type="text"
            id="categoria"
            placeholder="Categoria"
            required
        >

        <input
            type="number"
            id="preco"
            placeholder="Preço"
            step="0.01"
            min="0"
            required
        >

        <input
            type="number"
            id="quantidade"
            placeholder="Quantidade"
            min="1"
            required
        >

        <button type="submit">
            Salvar
        </button>

    </form>

    <hr>

    <table>

        <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Categoria</th>
                <th>Preço</th>
                <th>Quantidade</th>
                <th>Ações</th>
            </tr>
        </thead>

        <tbody id="listaProdutos">

        </tbody>

    </table>

    <script src="script.js"></script>
</body>
</html>
